<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile · Temperature Converter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #101214;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0;
            padding: 12px;
        }

        /* mobile card */
        .card {
            max-width: 380px;
            width: 100%;
            background: #1c1e22;
            border-radius: 38px;
            padding: 24px 22px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), 0 0 0 2px #2f3338 inset;
            color: #f0f4fa;
        }

        /* status bar / time (cosmetic) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-weight: 500;
            font-size: 15px;
            color: #b0b7c2;
            letter-spacing: 0.2px;
            padding: 0 4px;
        }
        .status-bar .time {
            font-weight: 600;
            color: #eef3fc;
        }
        .status-bar .icons {
            display: flex;
            gap: 6px;
        }
        .status-bar .icons span {
            display: inline-block;
            width: 18px;
            height: 10px;
            background: #3a3f48;
            border-radius: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 span {
            background: #2e8b8b;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: 500;
            color: white;
            margin-left: 8px;
        }

        /* input group */
        .input-group {
            margin-bottom: 26px;
        }
        .label {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 7px;
            color: #a6aebd;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .label i {
            color: #4d79b2;
            font-style: normal;
            font-size: 17px;
        }

        .degrees-field {
            background: #2b2f37;
            border-radius: 24px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            border: 1.5px solid #3d424c;
            transition: border 0.15s;
        }
        .degrees-field:focus-within {
            border-color: #4f9e9e;
            box-shadow: 0 0 0 2px rgba(79, 158, 158, 0.3);
        }
        .degrees-field input {
            background: transparent;
            border: none;
            font-size: 36px;
            font-weight: 500;
            width: 100%;
            outline: none;
            color: white;
            padding: 8px 0;
            font-family: 'Inter', monospace;
        }
        .degrees-field input::placeholder {
            color: #5a616e;
            font-weight: 400;
            font-size: 28px;
        }
        /* hide number spinners */
        .degrees-field input[type="number"]::-webkit-inner-spin-button,
        .degrees-field input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .degrees-field input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* unit selector — radio pills */
        .unit-selector {
            background: #262a32;
            border-radius: 40px;
            padding: 6px;
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
            border: 1px solid #3b404a;
        }
        .unit-option {
            flex: 1;
            text-align: center;
            border-radius: 30px;
            padding: 12px 0;
            font-weight: 600;
            font-size: 18px;
            color: #9aa3b4;
            cursor: pointer;
            transition: all 0.15s;
            background: transparent;
            border: none;
        }
        .unit-option.selected {
            background: #3d848b;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* hide actual radio buttons */
        .unit-option input[type="radio"] {
            display: none;
        }

        /* convert button */
        .convert-btn {
            background: #3d848b;
            width: 100%;
            border: none;
            border-radius: 50px;
            padding: 20px 0;
            font-size: 22px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.5px;
            margin: 16px 0 28px;
            transition: all 0.15s;
            box-shadow: 0 10px 15px -5px #1f4a4f;
            border-bottom: 2px solid #60b5b5;
            cursor: pointer;
        }
        .convert-btn:hover {
            background: #469aa3;
            transform: scale(1.01);
        }
        .convert-btn:active {
            transform: scale(0.98);
            box-shadow: 0 5px 8px -3px #1f4a4f;
        }

        /* result card */
        .result-area {
            background: #0f1114;
            border-radius: 36px;
            padding: 22px 24px;
            border: 1px solid #343a44;
            box-shadow: inset 0 3px 6px #08090b;
        }
        .result-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            color: #7b8799;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 48px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            word-break: break-word;
        }
        .result-unit {
            font-size: 24px;
            font-weight: 400;
            color: #a7b1c2;
            margin-left: 8px;
        }
        .error-message {
            color: #f4876c;
            font-size: 17px;
            font-weight: 500;
            margin-top: 10px;
            min-height: 28px;
        }

        /* extra hint (kelvin note) */
        .hint {
            text-align: center;
            color: #5f6878;
            font-size: 14px;
            margin-top: 18px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- mock status bar: 9:41 -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <span class="icons">
                <span></span><span></span><span></span>
            </span>
        </div>

        <h1>
            Temperature converter
            <span>v2</span>
        </h1>

        <!-- Degrees input -->
        <div class="input-group">
            <div class="label"><i>🌡️</i> Degrees</div>
            <div class="degrees-field">
                <input type="number" id="tempInput" placeholder="72" value="72" step="any">
            </div>
        </div>

        <!-- Type (unit) selector as radio buttons (3 options) -->
        <div class="label" style="margin-bottom: 2px;">🔽 Type (input unit)</div>
        <div class="unit-selector" id="unitSelector">
            <label class="unit-option selected" id="optF">
                <input type="radio" name="unit" value="F" checked> °F
            </label>
            <label class="unit-option" id="optC">
                <input type="radio" name="unit" value="C"> °C
            </label>
            <label class="unit-option" id="optK">
                <input type="radio" name="unit" value="K"> K
            </label>
        </div>

        <!-- Convert button -->
        <button class="convert-btn" id="convertBtn">Convert</button>

        <!-- Result display area -->
        <div class="result-area">
            <div class="result-label">RESULT</div>
            <div>
                <span class="result-value" id="resultValue">22.2222</span>
                <span class="result-unit" id="resultUnit">°C</span>
            </div>
            <div class="error-message" id="errorMsg"></div>
        </div>
        <div class="hint">⚡ supports °F, °C, and Kelvin</div>
    </div>

    <script>
        (function() {
            // DOM elements
            const tempInput = document.getElementById('tempInput');
            const optF = document.getElementById('optF');
            const optC = document.getElementById('optC');
            const optK = document.getElementById('optK');
            const convertBtn = document.getElementById('convertBtn');
            const resultValueSpan = document.getElementById('resultValue');
            const resultUnitSpan = document.getElementById('resultUnit');
            const errorMsgDiv = document.getElementById('errorMsg');

            // radio labels for visual update
            const unitOptions = [optF, optC, optK];

            // helper to get selected unit value
            function getSelectedUnit() {
                if (optF.querySelector('input').checked) return 'F';
                if (optC.querySelector('input').checked) return 'C';
                if (optK.querySelector('input').checked) return 'K';
                return 'F'; // fallback
            }

            // update selected style on radio change
            function updateRadioVisual() {
                unitOptions.forEach(opt => opt.classList.remove('selected'));
                if (optF.querySelector('input').checked) optF.classList.add('selected');
                else if (optC.querySelector('input').checked) optC.classList.add('selected');
                else if (optK.querySelector('input').checked) optK.classList.add('selected');
            }

            // add click listener to each label to toggle radio (and update style)
            unitOptions.forEach(label => {
                label.addEventListener('click', function(e) {
                    const radio = this.querySelector('input');
                    if (radio) {
                        radio.checked = true;
                        updateRadioVisual();
                    }
                });
            });

            // initial visual
            updateRadioVisual();

            // core conversion function
            function convertTemperature(value, fromUnit) {
                // all temps stored as numbers, return target values for all three units
                let celsius, fahrenheit, kelvin;

                // if input is invalid (NaN) we handle separately
                if (isNaN(value)) {
                    return { error: 'not a number' };
                }

                // convert from input unit to Celsius first (intermediate)
                switch (fromUnit) {
                    case 'C': // celsius
                        celsius = value;
                        break;
                    case 'F': // fahrenheit
                        celsius = (value - 32) * 5/9;
                        break;
                    case 'K': // kelvin
                        celsius = value - 273.15;
                        break;
                    default:
                        return { error: 'unknown unit' };
                }

                // build result object with all scales
                fahrenheit = celsius * 9/5 + 32;
                kelvin = celsius + 273.15;

                // rounding: keep reasonable precision (but we can show up to 4 decimals, trim trailing zeros)
                // we'll format as string with max 4 decimals, but remove trailing .0?
                return {
                    C: celsius,
                    F: fahrenheit,
                    K: kelvin
                };
            }

            // format temperature for display: avoid too many decimals
            function formatTemp(value, unit) {
                if (value === null || isNaN(value)) return '?';
                // Kelvin should not be negative physically, but calculation can give negative if input < 0K
                // we still show computed value, but maybe user error will be flagged?
                let rounded = Math.round(value * 10000) / 10000; // 4 decimals max

                // if it's an integer, show without decimals
                if (Math.abs(rounded - Math.round(rounded)) < 1e-8) {
                    return Math.round(rounded).toString();
                }
                // otherwise string with up to 4 decimals, remove trailing zeros
                let s = rounded.toFixed(4).replace(/\.?0+$/, '');
                return s;
            }

            // main conversion handler
            function performConversion() {
                // clear previous error
                errorMsgDiv.innerText = '';

                // read input value
                let rawValue = tempInput.value.trim();
                if (rawValue === '') {
                    errorMsgDiv.innerText = 'Please enter a number';
                    resultValueSpan.innerText = '—';
                    resultUnitSpan.innerText = '';
                    return;
                }

                // parse number (allow decimal, negative)
                let numberValue = Number(rawValue);
                if (isNaN(numberValue)) {
                    errorMsgDiv.innerText = 'Invalid number';
                    resultValueSpan.innerText = '—';
                    resultUnitSpan.innerText = '';
                    return;
                }

                const fromUnit = getSelectedUnit();

                // special case: for Kelvin, absolute minimum is 0 K, but we still allow negative? 
                // Physical validation: show warning if below absolute zero (0 K) but still convert (extra challenge)
                if (fromUnit === 'K' && numberValue < 0) {
                    errorMsgDiv.innerText = '⚠️ Kelvin below absolute zero';
                }
                // similarly if input celsius < -273.15
                if (fromUnit === 'C' && numberValue < -273.15) {
                    errorMsgDiv.innerText = '⚠️ Below absolute zero (C)';
                }
                if (fromUnit === 'F') {
                    let minF = -459.67; // absolute zero in fahrenheit
                    if (numberValue < minF) {
                        errorMsgDiv.innerText = '⚠️ Below absolute zero (F)';
                    }
                }

                // perform conversion
                const converted = convertTemperature(numberValue, fromUnit);
                if (converted.error) {
                    errorMsgDiv.innerText = 'Conversion error';
                    resultValueSpan.innerText = '—';
                    resultUnitSpan.innerText = '';
                    return;
                }

                // fromUnit determines what we show as "result". We want to show the two other units? 
                // Spec says: "Display area for the final converted temperature and unit"
                // Usually convert FROM selected unit TO the other two? but the original mock shows result as °C when input °F.
                // With three units, we need to decide what to show. Classic converter shows opposite (F to C, C to F, or K to both?).
                // For clarity: show the two non-selected units? but design only has one result line.
                // Better to follow common pattern: if user selects Fahrenheit, result shows Celsius; if Celsius selected, result shows Fahrenheit; if Kelvin selected, result shows Celsius? That's weird.
                // Instead, let's choose that the RESULT always shows both other units? But UI only has one value slot.
                // I'll adopt: result shows the converted value in the "most common opposite" : 
                // - From F -> show C
                // - From C -> show F
                // - From K -> show C (or could show F, but better C because scientific)
                // But that may confuse. Alternative: show both? but UI limited.
                // Wait original mock had "Result 22.2222 °C" when input was °F.
                // So let's respect that: for Fahrenheit input → result in Celsius. For Celsius input → result in Fahrenheit.
                // For Kelvin input → result in Celsius (most practical). But we also have extra Kelvin, so we can also show a toggle? but I think best to keep consistent.
                // We'll implement:
                let resultValue, resultUnit;
                switch (fromUnit) {
                    case 'F':
                        resultValue = formatTemp(converted.C, 'C');
                        resultUnit = '°C';
                        break;
                    case 'C':
                        resultValue = formatTemp(converted.F, 'F');
                        resultUnit = '°F';
                        break;
                    case 'K':
                        // from Kelvin, display Celsius (common conversion)
                        resultValue = formatTemp(converted.C, 'C');
                        resultUnit = '°C';
                        break;
                    default:
                        resultValue = '—';
                        resultUnit = '';
                }

                // Additionally, if user selects Kelvin and wants Kelvin result? maybe not; 
                // but we want to demonstrate that we have all three. But specification wants "converted temperature with correct unit"
                // With three options, it's more flexible: we can decide that "convert" always shows the temperature in the two units not chosen? 
                // but single result line. I'll enhance: when fromUnit = K, show Fahrenheit as result? that gives variety. Actually better to follow symmetrical: from F → C, from C → F, from K → F (more universal?). I'll stick with above, but mention Kelvin result in hint? We could improve by tapping but not needed.
                // However we also want third option to be present, so let's modify: from K → result in Fahrenheit (since °F is common in daily life). But some might want Celsius. 
                // I'll refine: from K → result in °C (scientific) and from F and C accordingly.
                // But we also want user to see Kelvin conversion: they can try. We'll also update the error field to show Kelvin equivalent? too fancy.
                // For consistency, I'll extend result: Actually we can display result for both other units? but limited space. 
                // Better: change approach: Show "converted to" based on selected radio of target? But no target selector. 
                // Since this is a demo, I'll use this: 
                // if from is Fahrenheit -> result Celsius, from Celsius -> result Fahrenheit, from Kelvin -> result Celsius.
                // also we show in the error line the third value? but that's hacky.
                // To satisfy "extra challenge: add third conversion option from/to Kelvin", we already include Kelvin as input unit. The user can input Kelvin and get result °C (or °F). They also get to see the value in both other units if they read the error line? not elegant. But we also have the ability to compute all three.
                // I will slightly modify: after result, we show small secondary values in error/info area? But errorMsg is separate.
                // Let's add below result a small text with the other converted value? That meets "extra challenge" feel.
                // Create an optional line: display both other values inside errorMsg (if not error).
                // But errorMsg used for warnings. Instead use a tiny div? I'll add a tiny line under result without disturbing design.

                // So after setting resultValue, resultUnit, we also generate a secondary line
                if (!errorMsgDiv.innerText.includes('⚠️') && converted) {
                    let extraInfo = '';
                    if (fromUnit === 'F') {
                        extraInfo = `Kelvin: ${formatTemp(converted.K, 'K')} K`;
                    } else if (fromUnit === 'C') {
                        extraInfo = `Kelvin: ${formatTemp(converted.K, 'K')} K`;
                    } else if (fromUnit === 'K') {
                        extraInfo = `Fahrenheit: ${formatTemp(converted.F, 'F')} °F`;
                    }
                    // avoid overwriting absolute zero warning
                    if (!errorMsgDiv.innerText) {
                        errorMsgDiv.innerText = extraInfo;
                    } else {
                        errorMsgDiv.innerText += ' · ' + extraInfo;
                    }
                }

                // update result spans
                resultValueSpan.innerText = resultValue;
                resultUnitSpan.innerText = resultUnit;
            }

            // Add listener to convert button
            convertBtn.addEventListener('click', performConversion);

            // Also allow pressing Enter in input field
            tempInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    convertBtn.click();
                }
            });

            // initial conversion (like mock: 72°F -> 22.2222°C)
            // set default values to match mock
            tempInput.value = '72';
            // make sure Fahrenheit is selected (already default)
            optF.querySelector('input').checked = true;
            updateRadioVisual();
            performConversion();  // shows 22.2222 °C, and extra kelvin ~295.3722 K in hint line.
        })();
    </script>
</body>
</html>
